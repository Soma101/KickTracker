<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KickTracker">
    <title>Record Kick</title>
    <style>
        body { margin: 0; background-color: black; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; }
        #btn-close { background-color: rgba(255, 255, 255, 0.3); color: white; }
        #btn-capture { background-color: #ff3b30; color: white; }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>
    
    <div class="controls">
        <button id="btn-close" onclick="closeCamera()">Cancel</button>
        <button id="btn-capture">Capture</button>
    </div>

    <script>
        const videoElement = document.getElementById('camera-feed');
        let mediaStream = null;

        // Equivalent to .onAppear()
        async function startCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                videoElement.srcObject = mediaStream;
            } catch (error) {
                alert("Camera access is required to track kicks.");
            }
        }

        // Equivalent to .onDisappear()
        function closeCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            window.location.href = 'index.html';
        }

        document.getElementById('btn-capture').addEventListener('click', () => {
            // Logic to save the video file or frames goes here
            alert("Video captured! Navigating to analysis...");
            closeCamera(); 
            window.location.href = 'analyze.html'; // Move to next view
        });

        startCamera();
    </script>
</body>
</html>
