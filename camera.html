<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KickTracker">
    <title>Record Kick</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100dvh; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            font-family: -apple-system, sans-serif;
        }

        #camera-feed {
            width: 100%;
            flex-grow: 1;
            min-height: 0;
            object-fit: cover;
            background-color: #1c1c1e;
        }

        .camera-controls {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 20px);
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: 20px;
        }

        .btn-cancel {
            color: white;
            font-size: 18px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .btn-record-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-record-inner {
            width: 64px;
            height: 64px;
            background-color: #ff3b30;
            border-radius: 50%;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .is-recording .btn-record-inner {
            width: 40px;
            height: 40px;
            border-radius: 8px; 
            background-color: #ff3b30;
        }

        #status-text {
            position: absolute;
            top: env(safe-area-inset-top, 40px);
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: none;
            z-index: 10;
        }

        /* Review Overlay Styles */
        #review-overlay {
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            width: 100%; 
            background: black;
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        #review-video {
            width: 100%;
            flex-grow: 1;
            min-height: 0;
            object-fit: contain; 
            background: #1c1c1e;
        }

        .review-controls {
            height: 120px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .btn-retake {
            background: #3a3a3c;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .btn-use {
            background: #007aff;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status-text">Recording... <span id="timer">00:00</span></div>
    <video id="camera-feed" autoplay playsinline muted></video>
    
    <div class="camera-controls" id="camera-controls">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        
        <div class="btn-record-wrapper" id="btn-record">
            <div class="btn-record-inner" id="record-inner-text">START</div>
        </div>
        
        <div style="width: 70px;"></div> 
    </div>

    <div id="review-overlay">
        <video id="review-video" controls playsinline></video>
        <div class="review-controls">
            <button class="btn-retake" id="btn-retake">Retake</button>
            <button class="btn-use" id="btn-use-video">Use Video</button>
        </div>
    </div>

    <script src="camera.js"></script>
</body>
</html>
