<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Database</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f2f2f7; /* iOS grouped background color */
            color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5ea;
            font-weight: bold;
            font-size: 17px;
        }

        .nav-bar button {
            background: none;
            border: none;
            font-size: 17px;
            cursor: pointer;
            padding: 0;
        }

        #btn-back { color: #007aff; }
        #btn-clear { color: #ff3b30; }

        /* List Styling */
        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .empty-state {
            text-align: center;
            color: #8e8e93;
            margin-top: 40px;
            font-size: 16px;
        }

        .section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: #8e8e93;
            margin-bottom: 8px;
            margin-left: 15px;
        }

        .list-card {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .list-card:active {
            background-color: #e5e5ea;
        }

        .card-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #000;
        }

        .card-subtitle {
            font-size: 15px;
            color: #8e8e93;
        }

        .card-right {
            text-align: right;
            font-size: 15px;
            font-weight: 600;
        }

        .text-green { color: #34c759; }
        .text-red { color: #ff3b30; }
        .text-orange { color: #ff9500; }

        /* Modal Styles (Duplicated from analyze.html) */
        #report-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: flex-end; /* Slides up from bottom */
            justify-content: center;
        }
        .report-content {
            background: #f2f2f7;
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .report-section {
            background: #ffffff;
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }
        .report-header { font-weight: 600; margin-bottom: 10px; font-size: 13px; color: #8e8e93; text-transform: uppercase;}
        .report-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; padding-bottom: 8px; border-bottom: 1px solid #e5e5ea; }
        .report-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .btn-close-modal { width: 100%; padding: 14px; background: #ffffff; color: #007aff; border: none; border-radius: 10px; font-weight: bold; font-size: 17px; cursor: pointer; margin-bottom: 20px;}
    </style>
</head>
<body>

    <div class="nav-bar">
        <button id="btn-back" onclick="window.location.href='index.html'">&#10094; Back</button>
        <div>History Database</div>
        <button id="btn-clear" onclick="clearHistory()" style="display: none;">Clear</button>
    </div>

    <div class="list-container" id="list-container">
        </div>

    <div id="report-modal">
        <div class="report-content">
            <h2 style="text-align:center; margin-top:0; font-size: 17px;">Actuarial Report</h2>
            
            <div class="report-section">
                <div class="report-header">Scoring Projection</div>
                <div class="report-row"><span>Max Good Distance</span> <span class="text-green" id="rep-max">-- yds</span></div>
                <div class="report-row"><span id="rep-past-label">Past -- yds</span> <span class="text-red" id="rep-miss">--</span></div>
            </div>

            <div class="report-section">
                <div class="report-header">Flight Physics</div>
                <div class="report-row"><span>Total Hang Time</span> <span id="rep-time" style="font-weight:600;">--s</span></div>
                <div class="report-row"><span>Peak Height</span> <span id="rep-height" style="font-weight:600;">-- ft</span></div>
                <div class="report-row"><span>Launch Angle</span> <span id="rep-angle" class="text-orange">--°</span></div>
                <div id="rep-warning" style="color:#ff9500; font-size:13px; margin-top:8px; display:none;"></div>
            </div>

            <div class="report-section">
                <div class="report-header">Optics Engine Data</div>
                <div class="report-row"><span>True Depth Travelled</span> <span id="rep-depth" style="color:#8e8e93;">-- yds</span></div>
            </div>

            <button class="btn-close-modal" onclick="closeReportModal()">Close Report</button>
        </div>
    </div>

    <script>
        let historyData = [];

        // Formatting date to roughly match iOS: "MM/dd/yyyy, HH:mm"
        function formatDate(dateString) {
            const date = new Date(dateString);
            if (isNaN(date)) return dateString; // Fallback if parsing fails
            
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${month}/${day}/${year}, ${hours}:${minutes}`;
        }

        // Renders the list of kicks
        function loadHistory() {
            const container = document.getElementById('list-container');
            const clearBtn = document.getElementById('btn-clear');
            historyData = JSON.parse(localStorage.getItem('kickHistory')) || [];

            container.innerHTML = ''; // Clear existing content

            if (historyData.length === 0) {
                clearBtn.style.display = 'none';
                container.innerHTML = `
                    <div class="empty-state">
                        No history available. Analyze a video to save your first kick!
                    </div>
                `;
                return;
            }

            clearBtn.style.display = 'block';

            // Add Section Header
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerText = `Recorded Kicks (${historyData.length})`;
            container.appendChild(header);

            // Loop through history (already sorted latest first by analyze.html)
            historyData.forEach((kick, index) => {
                // Calculate kick number (oldest is #1)
                const kickNumber = historyData.length - index;
                
                // Determine layout for right side status
                const maxDist = Math.max(0, kick.maxGoodDistance);
                let rightSideHTML = '';
                if (maxDist > 0) {
                    rightSideHTML = `<div class="text-green">≤ ${Math.floor(maxDist)} yds</div>`;
                } else {
                    rightSideHTML = `<div class="text-red">MISS</div>`;
                }

                // Create Card
                const card = document.createElement('div');
                card.className = 'list-card';
                card.onclick = () => openReportModal(index);
                card.innerHTML = `
                    <div class="card-left">
                        <div class="card-title">Kick #${kickNumber} (${formatDate(kick.date)})</div>
                        <div class="card-subtitle">${kick.distanceYards.toFixed(1)} yds &bull; ${kick.launchAngle.toFixed(1)}&deg;</div>
                    </div>
                    <div class="card-right">
                        ${rightSideHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Translates toolbar Clear button
        function clearHistory() {
            if (confirm("Are you sure you want to clear all history?")) {
                localStorage.removeItem('kickHistory');
                loadHistory();
            }
        }

        // Translates .sheet(item: $selectedKick)
        function openReportModal(index) {
            const report = historyData[index];
            if (!report) return;

            const maxGood = Math.max(0, report.maxGoodDistance);
            document.getElementById('rep-max').innerText = `≤ ${Math.floor(maxGood)} yds`;
            document.getElementById('rep-past-label').innerText = `Past ${Math.floor(maxGood)} yds`;
            document.getElementById('rep-miss').innerText = report.missType;
            
            document.getElementById('rep-time').innerText = `${report.totalTime.toFixed(2)}s`;
            document.getElementById('rep-height').innerText = `${report.peakHeightFeet.toFixed(1)} ft`;
            document.getElementById('rep-angle').innerText = `${report.launchAngle.toFixed(1)}°`;
            
            const warnEl = document.getElementById('rep-warning');
            if (report.angleWarning) {
                warnEl.innerText = report.angleWarning;
                warnEl.style.display = 'block';
            } else {
                warnEl.style.display = 'none';
            }
            
            document.getElementById('rep-depth').innerText = `${report.distanceYards.toFixed(1)} yds`;
            
            document.getElementById('report-modal').style.display = 'flex';
        }

        function closeReportModal() {
            document.getElementById('report-modal').style.display = 'none';
        }

        // Initialize view
        loadHistory();
    </script>
</body>
</html>
