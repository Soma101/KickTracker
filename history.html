<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KickTracker">
    <title>Kick History</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Prevents vertical bouncing */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }

        .sys-buttons {
            display: flex;
            justify-content: flex-start;
            padding: 8px 16px;
            background-color: #1c1c1e;
        }

        #btn-home {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #007aff;
            color: white;
        }

        h1 {
            text-align: center;
            margin: 15px 0;
            font-size: 24px;
            font-weight: 800;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-card {
            background-color: #1c1c1e;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #3a3a3c;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #8e8e93;
            border-bottom: 1px solid #3a3a3c;
            padding-bottom: 8px;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
        }

        .text-green { color: #34c759; }
        .text-red { color: #ff3b30; }
        .text-orange { color: #ff9500; }
        
        .empty-state {
            text-align: center;
            color: #8e8e93;
            margin-top: 50px;
            font-size: 18px;
        }
        
        .btn-clear {
            margin: 10px 16px;
            padding: 12px;
            background-color: #3a3a3c;
            color: #ff3b30;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="sys-buttons">
        <button id="btn-home" onclick="window.location.href='index.html'">&#10094; Home</button>
    </div>

    <h1>Kick History</h1>

    <div class="history-list" id="history-list">
        </div>

    <button class="btn-clear" id="btn-clear" onclick="clearHistory()" style="display: none;">Clear All History</button>

    <script>
        function loadHistory() {
            const historyList = document.getElementById('history-list');
            const clearBtn = document.getElementById('btn-clear');
            
            // Pulls the saved JSON array from your browser's local storage
            let history = JSON.parse(localStorage.getItem('kickHistory')) || [];

            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-state">No kicks recorded yet.<br><br>Go to Analyze Video to generate reports.</div>';
                clearBtn.style.display = 'none';
                return;
            }

            clearBtn.style.display = 'block';
            historyList.innerHTML = '';

            history.forEach((kick, index) => {
                const date = new Date(kick.date);
                const formattedDate = date.toLocaleDateString() + ' at ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const maxGood = Math.max(0, kick.maxGoodDistance);
                const missTextClass = kick.missType.includes("Short") || kick.missType.includes("Miss") ? "text-red" : "text-green";

                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span>Kick #${history.length - index}</span>
                        <span>${formattedDate}</span>
                    </div>
                    <div class="card-row">
                        <span>Max Good:</span>
                        <span class="text-green">≤ ${Math.floor(maxGood)} yds</span>
                    </div>
                    <div class="card-row">
                        <span>Past ${Math.floor(maxGood)} yds:</span>
                        <span class="${missTextClass}">${kick.missType}</span>
                    </div>
                    <div class="card-row" style="font-weight: normal; font-size: 14px; margin-top: 4px; color: #d1d1d6;">
                        <span>Time: ${kick.totalTime.toFixed(2)}s</span>
                        <span>Height: ${kick.peakHeightFeet.toFixed(1)}ft</span>
                        <span class="text-orange">Ang: ${kick.launchAngle.toFixed(1)}°</span>
                    </div>
                `;
                historyList.appendChild(card);
            });
        }

        function clearHistory() {
            if(confirm("Are you sure you want to delete all kick history? This cannot be undone.")) {
                localStorage.removeItem('kickHistory');
                loadHistory();
            }
        }

        // Run the load function as soon as the page opens
        window.onload = loadHistory;
    </script>
</body>
</html>
