<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KickTracker">
    <title>Kick Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            text-align: center;
        }

        h1 {
            font-size: 40px;
            font-weight: 900; 
            margin: 0 0 10px 0;
        }

        h2 {
            font-size: 18px;
            font-weight: 600; 
            color: #8e8e93; 
            margin: 0 0 50px 0;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 250px;
        }

        button {
            font-size: 20px;
            font-weight: bold;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }

        #btn-record { background-color: #ff3b30; } 
        #btn-analyze { background-color: #007aff; } 
        #btn-history { background-color: #34c759; } 
        
    </style>
</head>
<body>

    <h1>Kick Tracker</h1>
    <h2>Optics & Physics Engine</h2>
    
    <div class="button-container">
        <button id="btn-record" onclick="window.location.href='camera.html'">Record video</button>
        <button id="btn-analyze" onclick="window.location.href='analyze.html'">Analyze Video</button>
        <button id="btn-history" onclick="window.location.href='history.html'">Kick History</button>
    </div>

</body>
</html>
