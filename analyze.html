<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KickTracker</title>

<script src="physics-engine.js"></script>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system;
}

canvas {
    position:absolute;
    top:0;
    left:0;
}

video {
    max-width:100%;
}
</style>
</head>

<body>

<input type="file" id="file-upload" accept="video/*">

<br><br>

<video id="video-player" playsinline></video>
<canvas id="overlay"></canvas>

<br>

<button onclick="stepFrame(-1)">-1</button>
<button id="btn-playpause" onclick="togglePlay()">▶</button>
<button onclick="stepFrame(1)">+1</button>

<br><br>

<button id="btn-workflow">Start</button>

<script>
const video = document.getElementById('video-player');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn-workflow');

let activeTap = null;
let scaleDots = [];

let startPt = null;
let midUpPt = null;
let peakPt = null;
let midDownPt = null;
let endPt = null;

let animateCurve = false;
let animT = 0;

const physics = new KickPhysicsEngine();


// ================= LOAD VIDEO =================
document.getElementById('file-upload').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;

    video.src = URL.createObjectURL(file);

    video.onloadeddata = () => {
        resizeCanvas();
        resetAll();
    };
});

function resizeCanvas() {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
}

window.addEventListener('resize', resizeCanvas);


// ================= PLAYBACK =================
function togglePlay() {
    const btn = document.getElementById('btn-playpause');

    if (video.paused) {
        video.play();
        btn.innerText = '⏸';
    } else {
        video.pause();
        btn.innerText = '▶';
    }
}

function stepFrame(f) {
    video.pause();
    video.currentTime += (1/30) * f;
}


// ================= TAP =================
canvas.addEventListener('pointerdown', e => {
    const rect = canvas.getBoundingClientRect();
    activeTap = {
        x: (e.clientX - rect.left) / rect.width,
        y: (e.clientY - rect.top) / rect.height
    };
});


// ================= DRAW =================
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const w = canvas.width;
    const h = canvas.height;

    const drawDot = (pt,color) => {
        if (!pt) return;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.pos.x*w, pt.pos.y*h, 6, 0, Math.PI*2);
        ctx.fill();
    };

    drawDot(startPt,'green');
    drawDot(midUpPt,'cyan');
    drawDot(peakPt,'orange');
    drawDot(midDownPt,'cyan');
    drawDot(endPt,'red');

    // SAFE CURVE
    if (startPt && midUpPt && peakPt && midDownPt && endPt) {
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(startPt.pos.x*w, startPt.pos.y*h);

        if (animateCurve) {
            animT += 0.02;
            if (animT > 1) animT = 1;

            const t = animT;

            const s = startPt.pos;
            const m1 = midUpPt.pos;
            const p = peakPt.pos;
            const m2 = midDownPt.pos;
            const e = endPt.pos;

            const x =
                Math.pow(1-t,4)*s.x +
                4*Math.pow(1-t,3)*t*m1.x +
                6*Math.pow(1-t,2)*t*t*p.x +
                4*(1-t)*t*t*t*m2.x +
                t*t*t*t*e.x;

            const y =
                Math.pow(1-t,4)*s.y +
                4*Math.pow(1-t,3)*t*m1.y +
                6*Math.pow(1-t,2)*t*t*p.y +
                4*(1-t)*t*t*t*m2.y +
                t*t*t*t*e.y;

            ctx.lineTo(x*w, y*h);

            if (animT < 1) requestAnimationFrame(draw);
        } else {
            ctx.bezierCurveTo(
                midUpPt.pos.x*w,
                midUpPt.pos.y*h,
                midDownPt.pos.x*w,
                midDownPt.pos.y*h,
                endPt.pos.x*w,
                endPt.pos.y*h
            );
        }

        ctx.stroke();
    }
}


// ================= WORKFLOW =================
btn.onclick = () => {

    if (scaleDots.length < 2) {
        scaleDots.push(activeTap);
    }
    else if (!startPt) {
        startPt = {pos: activeTap, time: video.currentTime};
    }
    else if (!midUpPt) {
        midUpPt = {pos: activeTap, time: video.currentTime};
    }
    else if (!peakPt) {
        peakPt = {pos: activeTap, time: video.currentTime};
    }
    else if (!midDownPt) {
        midDownPt = {pos: activeTap, time: video.currentTime};
    }
    else if (!endPt) {
        endPt = {pos: activeTap, time: video.currentTime};

        // 🔥 RUN ANALYSIS
        const result = physics.calculate(
            startPt,
            midUpPt,
            peakPt,
            midDownPt,
            endPt,
            scaleDots,
            15,
            canvas.width
        );

        console.log("RESULT:", result);

        animateCurve = true;
        animT = 0;
    }

    draw();
};


// ================= RESET =================
function resetAll() {
    scaleDots = [];
    startPt = midUpPt = peakPt = midDownPt = endPt = null;
    animateCurve = false;
    animT = 0;
    draw();
}

</script>
</body>
</html>
