<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>KickTracker App</title>

    <script src="physics-engine.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            box-sizing: border-box;
        }

        .sys-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 10px;
            background-color: #1c1c1e;
        }
        .sys-buttons button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        #btn-home { background: #007aff; color: white; margin-right: auto; }
        #btn-reset { background: #3a3a3c; color: white; }
        #file-upload { display: none; }

        .dashboard {
            background-color: #1c1c1e;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .results-box {
            background-color: #2c2c2e;
            padding: 8px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            color: #007aff;
        }

        .viewport-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .controls {
            background-color: #1c1c1e;
            padding: 10px;
        }

        .workflow-bar {
            background-color: #1c1c1e;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .workflow-btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            background: #3a3a3c;
        }
    </style>
</head>

<body>

<div class="sys-buttons">
    <button id="btn-home">Home</button>
    <button id="btn-reset">Reset App</button>
    <button id="btn-new">New Video</button>
</div>

<div class="dashboard">
    <div class="row">
        <div class="results-box" id="status-text">Upload a video to begin.</div>
    </div>
</div>

<div class="viewport-container">

    <!-- ✅ THIS WAS THE CRASH FIX -->
    <video id="video-player" playsinline></video>
    <canvas id="overlay"></canvas>

</div>

<div class="controls">
    <input type="file" id="file-upload" accept="video/*">
</div>

<div class="workflow-bar">
    <button id="btn-workflow" class="workflow-btn">Analyze</button>
</div>

<script>
let video, canvas, ctx;
let isReady = false;

document.addEventListener("DOMContentLoaded", () => {

    video = document.getElementById("video-player");
    canvas = document.getElementById("overlay");

    if (!canvas) {
        console.error("❌ overlay canvas missing");
        return;
    }

    ctx = canvas.getContext("2d");

    // Resize canvas to match video
    function resize() {
        const rect = video.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    window.addEventListener("resize", resize);

    // File load
    document.getElementById("file-upload").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        video.src = URL.createObjectURL(file);

        video.onloadeddata = () => {
            resize();
            isReady = true;
            document.getElementById("status-text").innerText = "Video loaded.";
        };
    });

    // Simple draw test (prevents blank screen debugging confusion)
    function drawTest() {
        if (!isReady) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 10, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(drawTest);
    }

    drawTest();
});
</script>

</body>
</html>
