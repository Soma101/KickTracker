<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KickTracker</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* top bar */
.sys-buttons {
    display:flex;
    padding:10px;
    gap:8px;
    background:#1c1c1e;
}
button {
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-weight: bold;
    cursor: pointer;
}
#btn-home { background:#007aff; color:white; margin-right:auto; }
#btn-reset { background:#3a3a3c; color:white; }

/* dashboard */
.dashboard {
    background:#1c1c1e;
    padding:10px;
}

/* viewport */
.viewport-container {
    flex:1;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:black;
}

.video-wrap {
    position:relative;
    display:inline-block;
}

video {
    display:block;
    max-width:100%;
    max-height:100%;
}

canvas {
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
}

.results-box {
    font-size:12px;
    text-align:center;
    padding:6px;
    background:#2c2c2e;
    border-radius:8px;
}

/* controls */
.controls {
    background:#1c1c1e;
    padding:10px;
}

.row {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

/* upload */
.upload-placeholder {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#888;
}
</style>
</head>

<body>

<div class="sys-buttons">
    <button id="btn-home">Home</button>
    <button id="btn-reset" onclick="resetAll()">Reset</button>
    <input type="file" id="file" hidden>
</div>

<div class="dashboard">
    <div class="results-box" id="status">Upload video to begin</div>
</div>

<div class="viewport-container" id="viewport">
    <div class="upload-placeholder" id="upload">
        Click to upload
    </div>

    <div class="video-wrap" id="wrap" style="display:none;">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<div class="controls">
    <div class="row">
        <span>Cam Depth</span>
        <input type="range" id="depth" min="5" max="50" value="15">
    </div>
</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const wrap = document.getElementById("wrap");
const viewport = document.getElementById("viewport");

let scaleDots = [];
let activeTap = null;

let startPt=null, peakPt=null, endPt=null;
let cameraDepth = 15;

const status = document.getElementById("status");

/* -----------------------------
   FIXED: correct canvas sizing
----------------------------- */
function resizeCanvas() {
    const rect = video.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;

    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* -----------------------------
   VIDEO LOAD
----------------------------- */
document.getElementById("upload").onclick = () => {
    document.getElementById("file").click();
};

document.getElementById("file").onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;

    video.src = URL.createObjectURL(file);
    video.load();

    video.onloadeddata = () => {
        document.getElementById("upload").style.display="none";
        wrap.style.display="block";
        resizeCanvas();
        status.innerText = "Tap 2 scale points";
    };
};

/* -----------------------------
   MOUSE -> VIDEO SPACE FIX
----------------------------- */
function getXY(e) {
    const rect = video.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    return {x,y};
}

/* -----------------------------
   CLICK HANDLING
----------------------------- */
canvas.addEventListener("pointerdown",(e)=>{
    const pt = getXY(e);

    if(scaleDots.length < 2){
        scaleDots.push(pt);
        status.innerText = scaleDots.length===1
            ? "Tap second scale point"
            : "Scrub to impact";
        draw();
        return;
    }

    if(!startPt){
        startPt = {time:video.currentTime,pos:pt};
        status.innerText = "Mark peak";
        return;
    }

    if(!peakPt){
        peakPt = {time:video.currentTime,pos:pt};
        status.innerText = "Mark landing";
        return;
    }

    if(!endPt){
        endPt = {time:video.currentTime,pos:pt};
        analyze();
    }
});

/* -----------------------------
   DRAW (stable overlay system)
----------------------------- */
function draw(){
    resizeCanvas();
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const w = canvas.clientWidth;
    const h = canvas.clientHeight;

    ctx.fillStyle="cyan";
    for(const p of scaleDots){
        ctx.beginPath();
        ctx.arc(p.x*w,p.y*h,5,0,Math.PI*2);
        ctx.fill();
    }

    const drawPt=(p,color)=>{
        if(!p) return;
        ctx.fillStyle=color;
        ctx.beginPath();
        ctx.arc(p.pos.x*w,p.pos.y*h,6,0,Math.PI*2);
        ctx.fill();
    };

    drawPt(startPt,"green");
    drawPt(peakPt,"orange");
    drawPt(endPt,"red");
}

/* -----------------------------
   FIXED physics model (stable curve)
----------------------------- */
function analyze(){

    const t1 = startPt.time;
    const t2 = peakPt.time;
    const t3 = endPt.time;

    const totalTime = t3 - t1;
    const vUp = 32.17 * (t2 - t1);
    const height = 0.5 * 32.17 * Math.pow((t2 - t1),2);

    const dx = peakPt.pos.x - startPt.pos.x;
    const lateral = dx / totalTime;

    const forward = cameraDepth;

    const result = {
        time:totalTime,
        height,
        lateral
    };

    status.innerText =
        `T:${totalTime.toFixed(2)}s H:${height.toFixed(1)}ft L:${lateral.toFixed(3)}`;
}

/* -----------------------------
   RESET
----------------------------- */
function resetAll(){
    scaleDots=[];
    startPt=peakPt=endPt=null;
    status.innerText="Reset";
    draw();
}

window.onresize = draw;

</script>
</body>
</html>
