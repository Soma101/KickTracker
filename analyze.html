<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Analyze Video</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: #000; color: #fff; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .sys-buttons { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 16px; background-color: #1c1c1e; z-index: 100; }
        .sys-buttons button { padding: 6px 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        #btn-home { background: #007aff; color: white; margin-right: auto; }
        #btn-reset, #btn-new { background: #3a3a3c; color: white; display: none; }
        #btn-new { background: #ff3b30; }
        #file-upload { display: none; }

        .dashboard { background-color: #1c1c1e; padding: 10px 16px; display: flex; flex-direction: column; gap: 10px; z-index: 100; border-bottom: 1px solid #3a3a3c; }
        .row { display: flex; align-items: center; gap: 10px; justify-content: center; }
        select, input[type="range"] { padding: 6px; border-radius: 6px; background: #2c2c2e; color: white; border: 1px solid #3a3a3c; }

        .results-box { background-color: #2c2c2e; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 13px; text-align: center; color: #8e8e93; }

        .viewport-container { flex-grow: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        
        /* THE WRAPPER: Sized dynamically in JS to match video exactly */
        .zoom-wrapper { position: relative; overflow: visible; transition: transform 0.1s ease-out; transform-origin: center center; display: none; }
        
        video { width: 100%; height: 100%; display: block; pointer-events: none; }
        
        /* The Canvas: Exact twin of the video bounds */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 50; }

        .controls { background-color: #1c1c1e; padding: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .playback-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 20px; }
        .playback-row button { background: none; border: none; color: white; font-size: 18px; font-weight: bold; }

        .workflow-bar { background-color: #1c1c1e; padding: 15px; display: flex; justify-content: center; z-index: 100; }
        .workflow-btn { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; color: white; background: #007aff; }

        #report-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .report-content { background: #1c1c1e; width: 85%; max-width: 400px; border-radius: 16px; padding: 24px; border: 1px solid #3a3a3c; }
        .report-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 18px; border-bottom: 1px solid #3a3a3c; padding-bottom: 8px; }
        .btn-close-modal { width: 100%; padding: 14px; background: #007aff; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="sys-buttons">
        <button id="btn-home" onclick="window.location.href='index.html'">&#10094; Home</button>
        <button id="btn-reset" onclick="resetAll()">Reset</button>
        <button id="btn-new" onclick="document.getElementById('file-upload').click()">New Video</button>
        <input type="file" id="file-upload" accept="video/*">
    </div>

    <div class="dashboard">
        <div class="row">
            <select id="game-level"><option value="College" selected>College</option><option value="NFL">NFL</option></select>
            <select id="hash-pos"><option value="Middle" selected>Middle</option><option value="Left">Left</option><option value="Right">Right</option></select>
        </div>
        <div class="row" style="font-size: 12px;">
            Depth (Yds): <span id="depth-val">15</span>
            <input type="range" id="cam-depth" min="5" max="50" value="15" style="flex-grow:1;">
        </div>
        <div class="results-box" id="results-text">Upload Video to begin.</div>
    </div>

    <div class="viewport-container" id="viewport-container">
        <div id="zoom-wrapper" class="zoom-wrapper">
            <video id="video-player" playsinline muted style="max-width: 100vw; max-height: 60vh;"></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="upload-prompt" style="position: absolute; color: #007aff; font-weight: bold; text-decoration: underline; cursor: pointer;" onclick="document.getElementById('file-upload').click()">Upload Video</div>
    </div>

    <div class="controls" id="persistent-controls" style="display: none;">
        <div class="row">
            <span style="font-size: 12px; width: 45px;">Zoom:</span>
            <input type="range" id="zoom-slider" min="1" max="20" step="0.5" value="1" style="flex-grow:1;">
            <span id="zoom-val" style="font-size: 12px; width: 30px;">1x</span>
        </div>
        <div id="playback-controls">
            <input type="range" id="scrubber" min="0" max="1" step="0.001" value="0" style="width: 100%; margin-bottom: 10px;">
            <div class="playback-row">
                <button onclick="stepFrame(-1)">-1</button>
                <button id="btn-playpause" onclick="togglePlay()">⏸</button>
                <button onclick="stepFrame(1)">+1</button>
            </div>
        </div>
    </div>

    <div class="workflow-bar"><button id="btn-workflow" class="workflow-btn" disabled>Awaiting Video...</button></div>

    <div id="report-modal">
        <div class="report-content">
            <h2 style="text-align:center; margin-top:0;">Kick Report</h2>
            <div class="report-row"><span>Good From</span> <span class="text-green" id="rep-max">--</span></div>
            <div class="report-row"><span>Miss Logic</span> <span id="rep-miss" style="color:#ff3b30;">--</span></div>
            <div class="report-row"><span>Peak Ht</span> <span id="rep-height" style="font-weight:bold;">--</span></div>
            <button class="btn-close-modal" onclick="document.getElementById('report-modal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        const gravity = 32.17;
        const video = document.getElementById('video-player');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const zoomWrapper = document.getElementById('zoom-wrapper');
        const scrubber = document.getElementById('scrubber');
        
        let cameraDistance = 15.0; let ballSizeStart = 1.0; let ballSizeEnd = 1.0;
        let startAspectRatio = 1.0; let endAspectRatio = 1.0;
        let zoomLevel = 1.0; let activeTap = null; let activeTrace = []; 
        let isVideoLoaded = false; let isDrawing = false; let scaleDots = [];
        let startPt = null; let peakPt = null; let endPt = null;

        document.getElementById('file-upload').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            video.src = URL.createObjectURL(file); video.load();
            video.onloadedmetadata = setupVideoUI;
        });

        document.getElementById('zoom-slider').addEventListener('input', (e) => {
            zoomLevel = parseFloat(e.target.value);
            document.getElementById('zoom-val').innerText = zoomLevel + 'x';
            if (activeTap) {
                zoomWrapper.style.transformOrigin = `${activeTap.x * 100}% ${activeTap.y * 100}%`;
            }
            zoomWrapper.style.transform = `scale(${zoomLevel})`;
            draw(); 
        });

        // FIXED: Click handler uses canvas coordinates which are now restricted to video bounds
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            const pt = { x, y };

            if ((scaleDots.length >= 2 && !startPt) || (peakPt && !endPt)) {
                isDrawing = true; activeTrace = [pt];
            } else {
                handleTap(pt);
            }
            draw();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            activeTrace.push({ x: (e.clientX - rect.left) / rect.width, y: (e.clientY - rect.top) / rect.height });
            draw();
        });

        canvas.addEventListener('pointerup', () => { isDrawing = false; updateWorkflow(); });

        function handleTap(pt) {
            activeTap = pt;
            zoomWrapper.style.transformOrigin = `${activeTap.x * 100}% ${activeTap.y * 100}%`;
            zoomWrapper.style.transform = `scale(${zoomLevel})`;
            updateWorkflow(); draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width; const h = canvas.height;
            
            // CONSTANT SIZE: Markers and lines shrink internally to stay the same size on screen
            const thickness = (w / 400) / zoomLevel;
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';

            scaleDots.forEach(p => { 
                ctx.fillStyle = '#007aff'; ctx.beginPath(); ctx.arc(p.x * w, p.y * h, 10 / zoomLevel, 0, Math.PI*2); ctx.fill(); 
            });

            if (activeTrace.length > 1) {
                ctx.strokeStyle = 'black'; ctx.lineWidth = thickness * 3; ctx.beginPath();
                ctx.moveTo(activeTrace[0].x * w, activeTrace[0].y * h);
                activeTrace.forEach(p => ctx.lineTo(p.x * w, p.y * h)); ctx.stroke();
                ctx.strokeStyle = '#ffff00'; ctx.lineWidth = thickness; ctx.stroke();
            }

            if (activeTap) {
                const px = activeTap.x * w; const py = activeTap.y * h;
                const len = 20 / zoomLevel;
                ctx.strokeStyle = 'black'; ctx.lineWidth = thickness * 3; ctx.beginPath();
                ctx.moveTo(px-len, py); ctx.lineTo(px+len, py); ctx.moveTo(px, py-len); ctx.lineTo(px, py+len); ctx.stroke();
                ctx.strokeStyle = '#ffff00'; ctx.lineWidth = thickness; ctx.stroke();
            }

            const drawM = (pt, color) => { if(pt) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(pt.pos.x * w, pt.pos.y * h, 8 / zoomLevel, 0, Math.PI*2); ctx.fill(); } };
            drawM(startPt, '#34c759'); drawM(peakPt, '#ff9500'); drawM(endPt, '#ff3b30');
        }

        function setupVideoUI() {
            isVideoLoaded = true;
            document.getElementById('upload-prompt').style.display = 'none';
            zoomWrapper.style.display = 'flex';
            document.getElementById('persistent-controls').style.display = 'block';
            document.getElementById('btn-reset').style.display = 'inline-block';
            document.getElementById('btn-new').style.display = 'inline-block';
            
            // CRITICAL: Set the wrapper and canvas to the exact rendered size of the video
            const vWidth = video.clientWidth;
            const vHeight = video.clientHeight;
            zoomWrapper.style.width = vWidth + 'px';
            zoomWrapper.style.height = vHeight + 'px';
            
            // Internal Resolution matches original video file
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            scrubber.max = video.duration; 
            resetAll();
        }

        function updateWorkflow() {
            const btn = document.getElementById('btn-workflow');
            btn.disabled = false;
            if (scaleDots.length < 2) {
                btn.innerText = `SET SCALE DOT ${scaleDots.length + 1}`;
                btn.onclick = () => { scaleDots.push(activeTap); activeTap = null; updateWorkflow(); draw(); };
            } else if (!startPt) {
                btn.innerText = "LOCK IMPACT TRACE";
                btn.onclick = () => {
                    ballSizeStart = calculateTraceSize(); startAspectRatio = calculateAspectRatio();
                    startPt = { time: video.currentTime, pos: activeTap }; activeTap = null; activeTrace = []; updateWorkflow(); draw();
                };
            } else if (!peakPt) {
                btn.innerText = "MARK APEX";
                btn.onclick = () => { peakPt = { time: video.currentTime, pos: activeTap }; activeTap = null; updateWorkflow(); draw(); };
            } else if (!endPt) {
                btn.innerText = "FINALIZE LANDING TRACE";
                btn.onclick = () => {
                    ballSizeEnd = calculateTraceSize(); endAspectRatio = calculateAspectRatio();
                    endPt = { time: video.currentTime, pos: activeTap }; activeTap = null; activeTrace = []; calculatePhysics(); draw();
                };
            } else {
                btn.innerText = "VIEW REPORT"; btn.onclick = () => document.getElementById('report-modal').style.display='flex';
            }
        }

        function calculateTraceSize() {
            const xs = activeTrace.map(p => p.x * video.videoWidth); const ys = activeTrace.map(p => p.y * video.videoHeight);
            return Math.sqrt((Math.max(...xs)-Math.min(...xs)) * (Math.max(...ys)-Math.min(...ys)));
        }

        function calculateAspectRatio() {
            const xs = activeTrace.map(p => p.x * video.videoWidth); const ys = activeTrace.map(p => p.y * video.videoHeight);
            const w = Math.max(...xs)-Math.min(...xs); const h = Math.max(...ys)-Math.min(...ys);
            return Math.max(w, h) / Math.min(w, h);
        }

        function calculatePhysics() {
            const t = endPt.time - startPt.time; const tp = peakPt.time - startPt.time;
            const vy0 = gravity * tp; const peakH = 0.5 * gravity * (tp * tp);
            const rawR = ballSizeStart / ballSizeEnd;
            const exp = (endAspectRatio <= 1.7) ? 1.18 : Math.min(1.2 + (endAspectRatio-1.7)*0.1, 1.35);
            let dist = cameraDistance * (Math.pow(rawR, exp) - 1);
            const vz = dist / t;
            const yardsPerUnit = 10 / Math.sqrt(Math.pow(scaleDots[1].x-scaleDots[0].x, 2) + Math.pow(scaleDots[1].y-scaleDots[0].y, 2));
            const drift = (endPt.pos.x - startPt.pos.x) * yardsPerUnit;
            const vx = drift / t;
            const crossT = (vy0 + Math.sqrt(vy0*vy0 - 4*0.5*gravity*10)) / gravity;
            const hLim = vz * crossT; const tWide = 3.11 / Math.abs(vx || 0.001);
            const mg = Math.min(hLim, vz * tWide);
            document.getElementById('rep-max').innerText = Math.floor(mg) + " yds";
            document.getElementById('rep-miss').innerText = (vz * tWide < hLim) ? (vx > 0 ? "Miss Left" : "Miss Right") : "Falls Short";
            document.getElementById('rep-height').innerText = Math.floor(peakH) + " ft";
            updateWorkflow();
        }

        function togglePlay() { if (video.paused) { video.play(); } else { video.pause(); } }
        function stepFrame(f) { video.pause(); video.currentTime += (1/30) * f; }
        function resetAll() { scaleDots = []; startPt = null; peakPt = null; endPt = null; activeTap = null; activeTrace = []; zoomLevel = 1.0; zoomWrapper.style.transform = `scale(1)`; document.getElementById('zoom-slider').value = 1; updateWorkflow(); draw(); }
    </script>
</body>
</html>
