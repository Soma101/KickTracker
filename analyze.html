<script>
const fps = 30;

const video = document.getElementById('video-player');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const zoomWrapper = document.getElementById('zoom-wrapper');
const scrubber = document.getElementById('scrubber');
const statusText = document.getElementById('status-text');

let isVideoLoaded = false;
let isScrubbing = false;
let zoomLevel = 1.0;
let cameraDistance = 15.0;

// ✅ UPDATED STATE (5 POINTS)
let scaleDots = [];
let activeTap = null;
let startPt = null;
let midUpPt = null;
let peakPt = null;
let midDownPt = null;
let endPt = null;

// animation
let animateCurve = false;
let animT = 0;

const physics = new KickPhysicsEngine();

document.getElementById('file-upload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    video.src = URL.createObjectURL(file);
    video.load();
    video.onloadeddata = () => {
        document.getElementById('upload-placeholder').style.display = 'none';
        zoomWrapper.style.display = 'inline-flex';
        document.getElementById('persistent-controls').style.display = 'flex';
        isVideoLoaded = true;
        scrubber.max = video.duration;
        resizeCanvas();
        resetAll();
    };
});

function resizeCanvas() {
    if (!isVideoLoaded) return;
    const rect = video.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

document.getElementById('cam-depth').addEventListener('input', (e) => {
    cameraDistance = parseFloat(e.target.value);
    document.getElementById('depth-val').innerText = cameraDistance;
});

document.getElementById('zoom-slider').addEventListener('input', (e) => {
    zoomLevel = parseFloat(e.target.value);
    document.getElementById('zoom-val').innerText = zoomLevel.toFixed(1) + 'x';
    zoomWrapper.style.transform = `scale(${zoomLevel})`;
    draw();
});

video.addEventListener('timeupdate', () => { if (!isScrubbing) scrubber.value = video.currentTime; });
scrubber.addEventListener('input', (e) => { isScrubbing = true; video.currentTime = e.target.value; });
scrubber.addEventListener('change', () => { isScrubbing = false; });

function togglePlay() {
    if (video.paused) { video.play(); btn.innerText = '⏸'; }
    else { video.pause(); btn.innerText = '▶'; }
}

function stepFrame(f) {
    video.pause();
    video.currentTime += (1/fps) * f;
}

canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width);
    const y = ((e.clientY - rect.top) / rect.height);
    activeTap = {x, y};
    updateWorkflow();
    draw();
});

function draw() {
    if (!isVideoLoaded) return;

    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.clearRect(0, 0, w, h);

    const dot = (pt, color) => {
        if (!pt) return;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.pos.x * w, pt.pos.y * h, 6/zoomLevel, 0, Math.PI*2);
        ctx.fill();
    };

    dot(startPt,'#34c759');
    dot(midUpPt,'#ffff00');
    dot(peakPt,'#ff9500');
    dot(midDownPt,'#af52de');
    dot(endPt,'#ff3b30');

    // ✅ CURVE
    if (startPt && midUpPt && peakPt && midDownPt && endPt) {
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2/zoomLevel;
        ctx.beginPath();
        ctx.moveTo(startPt.pos.x*w,startPt.pos.y*h);

        if (animateCurve) {
            animT += 0.02;
            if (animT > 1) animT = 1;

            const t = animT;

            const x =
                Math.pow(1-t,4)*startPt.pos.x +
                4*Math.pow(1-t,3)*t*midUpPt.pos.x +
                6*Math.pow(1-t,2)*t*t*peakPt.pos.x +
                4*(1-t)*t*t*t*midDownPt.pos.x +
                t*t*t*t*endPt.pos.x;

            const y =
                Math.pow(1-t,4)*startPt.pos.y +
                4*Math.pow(1-t,3)*t*midUpPt.pos.y +
                6*Math.pow(1-t,2)*t*t*peakPt.pos.y +
                4*(1-t)*t*t*t*midDownPt.pos.y +
                t*t*t*t*endPt.pos.y;

            ctx.lineTo(x*w,y*h);

            if (animT < 1) requestAnimationFrame(draw);
        } else {
            ctx.bezierCurveTo(
                midUpPt.pos.x*w, midUpPt.pos.y*h,
                midDownPt.pos.x*w, midDownPt.pos.y*h,
                endPt.pos.x*w, endPt.pos.y*h
            );
        }

        ctx.stroke();
    }
}

function updateWorkflow() {
    const btn = document.getElementById('btn-workflow');

    if (scaleDots.length < 2) {
        statusText.innerText = "Set 2 scale points";
        btn.innerText = "CONFIRM DOT";
        btn.onclick = () => { scaleDots.push(activeTap); activeTap=null; updateWorkflow(); draw(); };
    }
    else if (!startPt) {
        statusText.innerText = "Mark IMPACT";
        btn.innerText = "IMPACT";
        btn.onclick = () => { startPt = {time:video.currentTime,pos:activeTap}; activeTap=null; updateWorkflow(); draw(); };
    }
    else if (!midUpPt) {
        statusText.innerText = "Mark HALF UP";
        btn.innerText = "HALF UP";
        btn.onclick = () => { midUpPt = {time:video.currentTime,pos:activeTap}; activeTap=null; updateWorkflow(); draw(); };
    }
    else if (!peakPt) {
        statusText.innerText = "Mark APEX";
        btn.innerText = "APEX";
        btn.onclick = () => { peakPt = {time:video.currentTime,pos:activeTap}; activeTap=null; updateWorkflow(); draw(); };
    }
    else if (!midDownPt) {
        statusText.innerText = "Mark HALF DOWN";
        btn.innerText = "HALF DOWN";
        btn.onclick = () => { midDownPt = {time:video.currentTime,pos:activeTap}; activeTap=null; updateWorkflow(); draw(); };
    }
    else if (!endPt) {
        statusText.innerText = "Mark LANDING";
        btn.innerText = "LANDING";
        btn.onclick = () => {
            endPt = {time:video.currentTime,pos:activeTap};
            activeTap=null;
            handleCalculateAndReport();
            updateWorkflow();
            draw();
        };
    }
    else {
        statusText.innerText = "Done";
        btn.innerText = "VIEW REPORT";
        btn.onclick = () => document.getElementById('report-modal').style.display='flex';
    }
}

function handleCalculateAndReport() {
    // Pass all 8 arguments exactly as the new engine expects them
    const r = physics.calculate(
        startPt, 
        midUpPt, 
        peakPt, 
        midDownPt, 
        endPt,
        scaleDots, 
        cameraDistance, 
        canvas.clientWidth
    );

    // Update the Actuarial Report UI
    document.getElementById('rep-max').innerText = `≤ ${Math.floor(r.maxGoodDistance)} yds`;
    document.getElementById('rep-miss').innerText = r.drift;
    document.getElementById('rep-time').innerText = `${r.time.toFixed(2)}s`;
    document.getElementById('rep-height').innerText = `${r.height.toFixed(1)} ft`;
    document.getElementById('rep-angle').innerText = `${r.angle.toFixed(1)}°`;

    // Draw the visual trajectory curve
    drawReportCurve();

    // Show the modal
    document.getElementById('report-modal').style.display = 'flex';
}
    
function drawReportCurve(){
    let c = document.getElementById('report-curve');
    if(!c){
        c = document.createElement('canvas');
        c.id='report-curve';
        c.style.width='100%';
        c.style.height='150px';
        document.querySelector('.report-content').appendChild(c);
    }

    const ctx2 = c.getContext('2d');
    c.width = c.clientWidth;
    c.height = c.clientHeight;

    ctx2.clearRect(0,0,c.width,c.height);

    if(!startPt) return;

    ctx2.strokeStyle='cyan';
    ctx2.beginPath();
    ctx2.moveTo(startPt.pos.x*c.width,startPt.pos.y*c.height);

    ctx2.bezierCurveTo(
        midUpPt.pos.x*c.width, midUpPt.pos.y*c.height,
        midDownPt.pos.x*c.width, midDownPt.pos.y*c.height,
        endPt.pos.x*c.width, endPt.pos.y*c.height
    );

    ctx2.stroke();
}

function toggleAnimation(){
    animateCurve = !animateCurve;
    animT = 0;
    draw();
}

function resetAll() {
    scaleDots = [];
    activeTap = startPt = midUpPt = peakPt = midDownPt = endPt = null;
    animT = 0;
    updateWorkflow();
    draw();
}
</script>
