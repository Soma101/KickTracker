<script>
    const video = document.getElementById('video-player');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const zoomWrapper = document.getElementById('zoom-wrapper');
    const scrubber = document.getElementById('scrubber');
    const statusText = document.getElementById('status-text');
    
    let isVideoLoaded = false;
    let isScrubbing = false;
    let zoomLevel = 1.0;
    let cameraDistance = 15.0;

    // -----------------------------
    // FPS / TIMING (FIXED VERSION)
    // -----------------------------
    let videoFps = 30;
    let frameStep = 1 / 30;

    video.addEventListener('loadedmetadata', () => {
        // Most reliable practical fallback
        videoFps = 30;

        // Try to improve estimate using real playback stats if available
        const estimate = video.duration ? (video.videoHeight ? 30 : 30) : 30;

        videoFps = estimate;
        frameStep = 1 / videoFps;
    });

    // State Machine Data
    let scaleDots = []; 
    let activeTap = null;
    let startPt = null; 
    let peakPt = null; 
    let endPt = null;

    const physics = new KickPhysicsEngine();

    // 1. Loading
    document.getElementById('file-upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        video.src = URL.createObjectURL(file);
        video.load();
        video.onloadeddata = () => {
            document.getElementById('upload-placeholder').style.display = 'none';
            zoomWrapper.style.display = 'inline-flex';
            document.getElementById('persistent-controls').style.display = 'flex';
            isVideoLoaded = true;
            scrubber.max = video.duration;
            resizeCanvas();
            resetAll();
        };
    });

    // 2. Canvas scaling
    function resizeCanvas() {
        if (!isVideoLoaded) return;
        const rect = video.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', () => { resizeCanvas(); draw(); });

    // Inputs
    document.getElementById('cam-depth').addEventListener('input', (e) => {
        cameraDistance = parseFloat(e.target.value);
        document.getElementById('depth-val').innerText = cameraDistance;
    });

    document.getElementById('zoom-slider').addEventListener('input', (e) => {
        zoomLevel = parseFloat(e.target.value);
        document.getElementById('zoom-val').innerText = zoomLevel.toFixed(1) + 'x';
        zoomWrapper.style.transform = `scale(${zoomLevel})`;
        draw(); 
    });

    // -----------------------------
    // PLAYBACK (FIXED STEP SYSTEM)
    // -----------------------------
    video.addEventListener('timeupdate', () => {
        if (!isScrubbing) scrubber.value = video.currentTime;
    });

    scrubber.addEventListener('input', (e) => {
        isScrubbing = true;
        video.currentTime = e.target.value;
    });

    scrubber.addEventListener('change', () => {
        isScrubbing = false;
    });

    function togglePlay() { 
        if (video.paused) {
            video.play();
            document.getElementById('btn-playpause').innerText = '⏸';
        } else {
            video.pause();
            document.getElementById('btn-playpause').innerText = '▶';
        }
    }

    // ✅ FIXED FRAME STEPPING (NO FPS BUGS)
    function stepFrame(dir) {
        video.pause();
        document.getElementById('btn-playpause').innerText = '▶';

        // time-based stepping (works for ALL videos)
        video.currentTime = Math.max(
            0,
            Math.min(video.duration, video.currentTime + (frameStep * dir))
        );
    }

    // -----------------------------
    // INPUT / TAP SYSTEM
    // -----------------------------
    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;

        activeTap = { x, y };
        updateWorkflow();
        draw();
    });

    // -----------------------------
    // DRAW SYSTEM (UNCHANGED LOGIC)
    // -----------------------------
    function draw() {
        if (!isVideoLoaded) return;

        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.clearRect(0, 0, w, h);

        const invZoom = 1 / zoomLevel;
        const dotRad = 6 * invZoom;

        if (scaleDots.length === 2) {
            ctx.strokeStyle = '#3a3a3c';
            ctx.lineWidth = 2 * invZoom;
            ctx.beginPath();
            ctx.moveTo(scaleDots[0].x * w, scaleDots[0].y * h);
            ctx.lineTo(scaleDots[1].x * w, scaleDots[1].y * h);
            ctx.stroke();
        }

        ctx.fillStyle = '#007aff';
        scaleDots.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, dotRad, 0, Math.PI * 2);
            ctx.fill();
        });

        const drawMarker = (pt, color) => {
            if (!pt) return;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(pt.pos.x * w, pt.pos.y * h, dotRad, 0, Math.PI * 2);
            ctx.fill();
        };

        drawMarker(startPt, '#34c759');
        drawMarker(peakPt, '#ff9500');
        drawMarker(endPt, '#ff3b30');
    }

    // -----------------------------
    // WORKFLOW (UNCHANGED)
    // -----------------------------
    function updateWorkflow() {
        const btn = document.getElementById('btn-workflow');

        if (scaleDots.length === 0) {
            statusText.innerText = "Step 1: Tap scale point 1 (10 yds)";
            btn.innerText = "CONFIRM 1ST DOT";
            btn.onclick = () => {
                scaleDots.push(activeTap);
                activeTap = null;
                updateWorkflow();
                draw();
            };
        }
        else if (scaleDots.length === 1) {
            statusText.innerText = "Step 2: Tap scale point 2 (10 yds)";
            btn.innerText = "CONFIRM 2ND DOT";
            btn.onclick = () => {
                scaleDots.push(activeTap);
                activeTap = null;
                updateWorkflow();
                draw();
            };
        }
        else if (!startPt) {
            statusText.innerText = "Mark IMPACT";
            btn.innerText = "MARK IMPACT";
            btn.onclick = () => {
                startPt = { time: video.currentTime, pos: activeTap };
                activeTap = null;
                updateWorkflow();
                draw();
            };
        }
        else if (!peakPt) {
            statusText.innerText = "Mark PEAK";
            btn.innerText = "MARK PEAK";
            btn.onclick = () => {
                peakPt = { time: video.currentTime, pos: activeTap };
                activeTap = null;
                updateWorkflow();
                draw();
            };
        }
        else if (!endPt) {
            statusText.innerText = "Mark LANDING";
            btn.innerText = "MARK LANDING";
            btn.onclick = () => {
                endPt = { time: video.currentTime, pos: activeTap };
                activeTap = null;
                handleCalculateAndReport();
                updateWorkflow();
                draw();
            };
        }
    }

    // -----------------------------
    // REPORT (UNCHANGED)
    // -----------------------------
    function handleCalculateAndReport() {
        const report = physics.calculate(startPt, peakPt, endPt, scaleDots, cameraDistance, canvas.clientWidth);

        document.getElementById('rep-max').innerText = `≤ ${Math.floor(report.maxGoodDistance)} yds`;
        document.getElementById('rep-miss').innerText = report.drift;
        document.getElementById('rep-time').innerText = `${report.time.toFixed(2)}s`;
        document.getElementById('rep-height').innerText = `${report.height.toFixed(1)} ft`;
        document.getElementById('rep-angle').innerText = `${report.angle.toFixed(1)}°`;

        document.getElementById('report-modal').style.display = 'flex';
    }

    function resetAll() {
        scaleDots = [];
        activeTap = startPt = peakPt = endPt = null;

        if (isVideoLoaded) {
            video.pause();
            video.currentTime = 0;
        }

        updateWorkflow();
        draw();
    }
</script>
