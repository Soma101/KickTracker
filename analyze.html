<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KickTracker">
    <title>Analyze Video</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: #000; color: #fff; display: flex; flex-direction: column; height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); overflow: hidden; box-sizing: border-box; }
        .sys-buttons { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 16px; background-color: #1c1c1e; z-index: 50; }
        .sys-buttons button { padding: 6px 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        #btn-home { background: #007aff; color: white; margin-right: auto; }
        #btn-reset { background: #3a3a3c; color: white; display: none; }
        #btn-new { background: #ff3b30; color: white; display: none; }
        #file-upload { display: none; }

        .dashboard { background-color: #1c1c1e; padding: 10px 16px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .row { display: flex; align-items: center; gap: 10px; justify-content: center; }
        select, input[type="range"] { padding: 4px; border-radius: 4px; background: #2c2c2e; color: white; border: 1px solid #3a3a3c; }

        .results-box { background-color: #2c2c2e; padding: 8px; border-radius: 8px; font-family: monospace; font-size: 13px; min-height: 20px; text-align: center; }

        .viewport-container { flex-grow: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        
        /* The Wrapper: Contains both video and canvas for perfect sync */
        .zoom-wrapper { position: relative; display: flex; align-items: center; justify-content: center; transition: transform 0.05s linear; transform-origin: center center; }
        
        video { display: block; max-width: 100%; max-height: 100%; width: auto; height: auto; }

        /* The Canvas: Now a child of the zoom-wrapper so it scales with the video */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 20; }

        .upload-placeholder { position: absolute; color: #007aff; font-weight: bold; cursor: pointer; z-index: 25; }

        .controls { background-color: #1c1c1e; padding: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .playback-row { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .playback-row button { background: none; border: none; color: white; font-size: 16px; cursor: pointer; }

        .workflow-bar { background-color: #1c1c1e; padding: 15px; display: flex; justify-content: center; z-index: 50; }
        .workflow-btn { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; color: white; background: #3a3a3c; }

        #report-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .report-content { background: #1c1c1e; width: 90%; max-width: 400px; border-radius: 16px; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .report-section { background: #2c2c2e; border-radius: 10px; padding: 10px 15px; margin-bottom: 15px; }
        .report-header { font-weight: bold; margin-bottom: 10px; font-size: 14px; color: #8e8e93; text-transform: uppercase; }
        .report-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; border-bottom: 1px solid #3a3a3c; padding-bottom: 8px; }
        .report-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .text-green { color: #34c759; font-weight: bold; }
        .text-red { color: #ff3b30; font-weight: bold; }
        .text-orange { color: #ff9500; font-weight: bold; }
        .btn-close-modal { width: 100%; padding: 14px; background: #007aff; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sys-buttons">
        <button id="btn-home" onclick="window.location.href='index.html'">&#10094; Home</button>
        <button id="btn-reset" onclick="resetAll()">Reset</button>
        <button id="btn-new" onclick="document.getElementById('file-upload').click()">New Video</button>
        <input type="file" id="file-upload" accept="video/*">
    </div>

    <div class="dashboard">
        <div class="row">
            <select id="game-level"><option value="NFL">NFL</option><option value="College" selected>College</option></select>
            <select id="hash-pos"><option value="Left">Left</option><option value="Middle" selected>Middle</option><option value="Right">Right</option></select>
        </div>
        <div class="row" style="font-size: 12px; font-weight: bold;">
            Cam Depth (Yds): <span id="depth-val">15</span>
            <input type="range" id="cam-depth" min="5" max="50" step="1" value="15" style="flex-grow:1;">
        </div>
        <div class="results-box" id="results-text">Trace scale or impact point.</div>
    </div>

    <div class="viewport-container" id="viewport-container">
        <div class="upload-placeholder" id="upload-placeholder" onclick="document.getElementById('file-upload').click()">Upload Video</div>
        <div class="zoom-wrapper" id="zoom-wrapper" style="display: none;">
            <video id="video-player" playsinline muted></video>
            <canvas id="overlay"></canvas>
        </div>
    </div>

    <div class="controls" id="persistent-controls" style="display: none;">
        <div class="row" style="padding: 0 10px;">
            <span style="font-size: 12px; font-weight: bold; width: 45px;">Zoom:</span>
            <input type="range" id="zoom-slider" min="1" max="20" step="0.1" value="1" style="flex-grow:1;">
            <span id="zoom-val" style="font-size: 12px; width: 35px; text-align: right;">1x</span>
        </div>
        <div id="trace-controls" style="display: none; justify-content: center; gap: 10px;">
            <button onclick="activeTrace = []; draw()" style="background:#ff3b30; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">CLEAR</button>
            <button id="btn-confirm-trace" style="background:#34c759; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">CONFIRM</button>
        </div>
        <div id="playback-controls">
            <input type="range" id="scrubber" min="0" max="1" step="0.01" value="0" style="width: 100%; margin-bottom: 10px;">
            <div class="playback-row">
                <button onclick="stepFrame(-1)">-1 Fr</button>
                <button id="btn-playpause" onclick="togglePlay()" style="font-size: 24px;">⏸</button>
                <button onclick="stepFrame(1)">+1 Fr</button>
            </div>
        </div>
    </div>

    <div class="workflow-bar"><button id="btn-workflow" class="workflow-btn" disabled>Awaiting Video...</button></div>

    <div id="report-modal">
        <div class="report-content">
            <h2 style="text-align:center; margin-top:0;">Actuarial Report</h2>
            <div class="report-section">
                <div class="report-header">Success Analytics</div>
                <div class="report-row"><span>Good From</span> <span class="text-green" id="rep-max">-- yds</span></div>
                <div class="report-row"><span id="rep-past-label">Past Limit</span> <span class="text-red" id="rep-miss">--</span></div>
            </div>
            <div class="report-section">
                <div class="report-header">Trajectory Physics</div>
                <div class="report-row"><span>Total Time</span> <span id="rep-time" style="font-weight:bold;">--s</span></div>
                <div class="report-row"><span>Peak Height</span> <span id="rep-height" style="font-weight:bold;">-- ft</span></div>
                <div class="report-row"><span>Launch Angle</span> <span id="rep-angle" class="text-orange">--°</span></div>
            </div>
            <div class="report-section">
                <div class="report-header">Optics Data</div>
                <div class="report-row"><span>Calculated Depth</span> <span id="rep-depth" style="color:#8e8e93;">-- yds</span></div>
            </div>
            <button class="btn-close-modal" onclick="document.getElementById('report-modal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        const gravity = 32.17;
        const video = document.getElementById('video-player');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const zoomWrapper = document.getElementById('zoom-wrapper');
        const scrubber = document.getElementById('scrubber');
        
        let isVideoLoaded = false; let isScrubbing = false; let activeReport = null;
        let cameraDistance = 15.0; let ballSizeStart = 10.0; let ballSizeEnd = 10.0;
        let startAspectRatio = 1.0; let endAspectRatio = 1.0; let isAdjustingSize = false; let zoomLevel = 1.0;
        let scaleDots = []; let activeTap = null; let activeTrace = []; let isDrawingTrace = false;
        let startPt = null; let ascentPt = null; let peakPt = null; let descentPt = null; let endPt = null;

        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            video.onloadedmetadata = () => { setupVideoUI(); };
            video.src = URL.createObjectURL(file); video.load();
        });

        document.getElementById('cam-depth').addEventListener('input', (e) => {
            cameraDistance = parseFloat(e.target.value); document.getElementById('depth-val').innerText = cameraDistance;
        });

        // --- FIXED ZOOM LOGIC: Centers exactly on activeTap ---
        document.getElementById('zoom-slider').addEventListener('input', (e) => {
            zoomLevel = parseFloat(e.target.value);
            document.getElementById('zoom-val').innerText = zoomLevel.toFixed(1) + 'x';
            
            if (activeTap) {
                // Origin is set to the percentage of the video where you tapped
                zoomWrapper.style.transformOrigin = `${activeTap.x * 100}% ${activeTap.y * 100}%`;
            } else {
                zoomWrapper.style.transformOrigin = 'center center';
            }
            zoomWrapper.style.transform = `scale(${zoomLevel})`;
            draw(); 
        });

        video.addEventListener('timeupdate', () => { if (!isScrubbing) scrubber.value = video.currentTime; });
        scrubber.addEventListener('input', (e) => { isScrubbing = true; video.currentTime = e.target.value; });
        scrubber.addEventListener('change', () => { isScrubbing = false; });

        // --- SIMPLIFIED COORDINATES: Taps are relative to the video pixels ---
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            const pt = { x, y };

            if (isAdjustingSize) { isDrawingTrace = true; activeTrace = [pt]; } 
            else { handleTap(pt); }
            draw();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawingTrace) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            activeTrace.push({ x, y });
            draw();
        });

        canvas.addEventListener('pointerup', () => { isDrawingTrace = false; updateWorkflow(); });

        function handleTap(pt) {
            activeTap = pt;
            // Immediate re-center zoom when tapping while zoomed
            zoomWrapper.style.transformOrigin = `${activeTap.x * 100}% ${activeTap.y * 100}%`;
            zoomWrapper.style.transform = `scale(${zoomLevel})`;
            updateWorkflow();
            draw();
        }

        // --- DRAWING: SHARP RETINA Child-Canvas ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width / 3, canvas.height / 3);
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            const w = canvas.width / 3;
            const h = canvas.height / 3;

            // Markers are drawn in un-zoomed space, but scaling is handled by CSS
            scaleDots.forEach(pt => { 
                ctx.fillStyle = '#007aff'; ctx.beginPath(); ctx.arc(pt.x * w, pt.y * h, 8 / zoomLevel, 0, Math.PI * 2); ctx.fill(); 
            });

            if (isAdjustingSize && activeTrace.length > 0) {
                ctx.strokeStyle = 'black'; ctx.lineWidth = 3 / zoomLevel;
                ctx.beginPath(); 
                ctx.moveTo(activeTrace[0].x * w, activeTrace[0].y * h);
                for (let i = 1; i < activeTrace.length; i++) {
                    ctx.lineTo(activeTrace[i].x * w, activeTrace[i].y * h);
                }
                ctx.stroke();
                ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 1 / zoomLevel; ctx.stroke();
            }

            if (activeTap && !isAdjustingSize) {
                const px = activeTap.x * w; const py = activeTap.y * h;
                const len = 15 / zoomLevel;
                ctx.strokeStyle = 'black'; ctx.lineWidth = 3 / zoomLevel;
                ctx.beginPath(); ctx.moveTo(px, py - len); ctx.lineTo(px, py + len); ctx.moveTo(px - len, py); ctx.lineTo(px + len, py); ctx.stroke();
                ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 1 / zoomLevel; ctx.stroke();
            }

            const drawMarker = (pt, color) => {
                if (!pt) return; 
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(pt.pos.x * w, pt.pos.y * h, 6 / zoomLevel, 0, Math.PI * 2); ctx.fill();
            };
            drawMarker(startPt, '#34c759'); drawMarker(ascentPt, '#ffcc00'); drawMarker(peakPt, '#ff9500'); drawMarker(descentPt, '#ffcc00'); drawMarker(endPt, '#ff3b30'); 
        }

        function updateWorkflow() {
            if (!isVideoLoaded) return;
            const btn = document.getElementById('btn-workflow'); const trc = document.getElementById('trace-controls'); const pb = document.getElementById('playback-controls');
            if (isAdjustingSize) {
                trc.style.display = 'flex'; pb.style.display = 'none'; btn.style.display = 'none';
                const cBtn = document.getElementById('btn-confirm-trace'); cBtn.disabled = activeTrace.length < 2;
                if (startPt === null) { cBtn.innerText = "CONFIRM START"; cBtn.onclick = confirmStartTrace; } 
                else { cBtn.innerText = "FINALIZE KICK"; cBtn.onclick = confirmEndTrace; }
                return;
            } 
            trc.style.display = 'none'; pb.style.display = 'block'; btn.style.display = 'block'; btn.disabled = false;
            if (scaleDots.length === 0) {
                btn.innerText = "SET 1ST SCALE DOT"; btn.onclick = () => { scaleDots.push(activeTap); activeTap = null; updateWorkflow(); draw(); };
            } else if (scaleDots.length === 1) {
                btn.innerText = "SET 2ND SCALE DOT"; btn.onclick = () => { scaleDots.push(activeTap); activeTap = null; updateWorkflow(); draw(); };
            } else if (startPt === null) {
                btn.innerText = "LOCK IMPACT"; btn.onclick = () => { isAdjustingSize = true; updateWorkflow(); };
            } else if (ascentPt === null) {
                btn.innerText = "MARK ASCENT"; btn.onclick = () => { ascentPt = {time: video.currentTime, pos: activeTap}; activeTap = null; updateWorkflow(); draw(); };
            } else if (peakPt === null) {
                btn.innerText = "MARK APEX"; btn.onclick = () => { peakPt = {time: video.currentTime, pos: activeTap}; activeTap = null; updateWorkflow(); draw(); };
            } else if (descentPt === null) {
                btn.innerText = "MARK DESCENT"; btn.onclick = () => { descentPt = {time: video.currentTime, pos: activeTap}; activeTap = null; updateWorkflow(); draw(); };
            } else if (endPt === null) {
                btn.innerText = "LOCK LANDING"; btn.onclick = () => { isAdjustingSize = true; updateWorkflow(); };
            } else { btn.innerText = "VIEW REPORT"; btn.onclick = showReportModal; }
        }

        function calculateTraceSize() {
            const xs = activeTrace.map(pt => pt.x * video.videoWidth); const ys = activeTrace.map(pt => pt.y * video.videoHeight);
            return Math.sqrt((Math.max(...xs) - Math.min(...xs)) * (Math.max(...ys) - Math.min(...ys)));
        }

        function calculateAspectRatio() {
            const xs = activeTrace.map(pt => pt.x * video.videoWidth); const ys = activeTrace.map(pt => pt.y * video.videoHeight);
            const w = Math.max(...xs) - Math.min(...xs); const h = Math.max(...ys) - Math.min(...ys);
            return Math.max(w, h) / Math.min(w, h);
        }

        function confirmStartTrace() {
            ballSizeStart = calculateTraceSize(); startAspectRatio = calculateAspectRatio();
            startPt = {time: video.currentTime, pos: activeTap}; activeTap = null; activeTrace = []; isAdjustingSize = false; 
            updateWorkflow(); draw();
        }

        function confirmEndTrace() {
            ballSizeEnd = calculateTraceSize(); endAspectRatio = calculateAspectRatio();
            endPt = {time: video.currentTime, pos: activeTap}; activeTap = null; activeTrace = []; isAdjustingSize = false;
            calculateOpticsPhysics(); updateWorkflow(); draw();
        }

        function calculateOpticsPhysics() {
            if (!startPt || !peakPt || !endPt) return;
            const totalTime = Math.abs(endPt.time - startPt.time); const timeToPeak = Math.abs(peakPt.time - startPt.time);
            const v_y0_ft = gravity * timeToPeak; const peakH_ft = 0.5 * gravity * (timeToPeak * timeToPeak);

            const rawRatio = ballSizeStart / ballSizeEnd;
            let dynamicExponent = (endAspectRatio <= 1.7) ? 1.18 : Math.min(1.20 + (endAspectRatio - 1.7) * 0.10, 1.35);
            let zDistanceYards = cameraDistance * (Math.pow(rawRatio, dynamicExponent) - 1.0);
            
            const max_Z = (v_y0_ft / Math.tan(20 * Math.PI / 180)) * totalTime / 3.0;
            if (zDistanceYards > max_Z) zDistanceYards = max_Z;

            const v_z0_yards = (zDistanceYards) / totalTime;
            const p1 = scaleDots[0], p2 = scaleDots[1];
            const yardsPerUnit = 10.0 / Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            
            const dxEnd = (endPt.pos.x - startPt.pos.x) * yardsPerUnit;
            const accelX = (2 * dxEnd) / (totalTime * totalTime);

            let maxGood = 0; let missType = "Falls Short"; let hitWide = false;
            for (let t = 0; t <= totalTime; t += 0.05) {
                const z = v_z0_yards * t; const x = 0.5 * accelX * (t * t);
                const y = (v_y0_ft * t) - (0.5 * gravity * (t * t));
                if (y < 10.0 && t > timeToPeak) break; 
                if (Math.abs(x) < 3.11) { maxGood = z; } 
                else { hitWide = true; missType = (accelX > 0) ? "Misses Right" : "Misses Left"; break; }
            }

            activeReport = {
                date: new Date().toISOString(), totalTime, peakHeightFeet: peakH_ft, distanceYards: zDistanceYards, maxGoodDistance: maxGood,
                launchAngle: Math.atan2(v_y0_ft, v_z0_yards * 3.0) * (180/Math.PI),
                missType: hitWide ? missType : "Falls Short"
            };
            let history = JSON.parse(localStorage.getItem('kickHistory')) || []; history.unshift(activeReport); localStorage.setItem('kickHistory', JSON.stringify(history));
            showReportModal();
        }

        function showReportModal() {
            if (!activeReport) return;
            document.getElementById('rep-max').innerText = `≤ ${Math.floor(activeReport.maxGoodDistance)} yds`;
            document.getElementById('rep-miss').innerText = activeReport.missType;
            document.getElementById('rep-time').innerText = `${activeReport.totalTime.toFixed(2)}s`;
            document.getElementById('rep-height').innerText = `${activeReport.peakHeightFeet.toFixed(1)} ft`;
            document.getElementById('rep-angle').innerText = `${activeReport.launchAngle.toFixed(1)}°`;
            document.getElementById('rep-depth').innerText = `${activeReport.distanceYards.toFixed(1)} yds`;
            document.getElementById('report-modal').style.display = 'flex';
        }

        function togglePlay() { if (video.paused) { video.play(); document.getElementById('btn-playpause').innerText = '⏸'; } else { video.pause(); document.getElementById('btn-playpause').innerText = '▶'; } }
        function stepFrame(f) { video.pause(); video.currentTime += (1/30) * f; }
        
        function resetAll() {
            scaleDots = []; startPt = null; ascentPt = null; peakPt = null; descentPt = null; endPt = null;
            zoomLevel = 1.0; activeTap = null; zoomWrapper.style.transform = `scale(1)`; document.getElementById('zoom-slider').value = 1;
            video.currentTime = 0; updateWorkflow(); draw();
        }

        function setupVideoUI() {
            isVideoLoaded = true; document.getElementById('upload-placeholder').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'inline-block'; document.getElementById('btn-new').style.display = 'inline-block';
            zoomWrapper.style.display = 'flex'; document.getElementById('persistent-controls').style.display = 'flex';
            
            // TRIPLE-RESOLUTION SETUP for zoom clarity
            const rect = video.getBoundingClientRect();
            canvas.width = rect.width * 3;
            canvas.height = rect.height * 3;
            ctx.scale(3, 3);
            
            scrubber.max = video.duration; resetAll();
        }
    </script>
</body>
</html>
