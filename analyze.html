<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KickTracker</title>
<script src="physics-engine.js"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
.viewport-container { position:relative; height:60vh; display:flex; justify-content:center; align-items:center; }
video { max-width:100%; max-height:100%; }
canvas { position:absolute; top:0; left:0; }

.controls, .dashboard { padding:10px; background:#111; }
button { padding:10px; margin:5px; }

#report-modal {
 display:none; position:fixed; inset:0;
 background:rgba(0,0,0,0.8);
 justify-content:center; align-items:center;
}
.report-content {
 background:#111; padding:20px; border-radius:10px;
 width:90%; max-width:400px;
}
</style>
</head>

<body>

<input type="file" id="file-upload" accept="video/*">

<div class="dashboard">
Cam Depth: <input type="range" id="cam-depth" min="5" max="50" value="15">
<span id="depth-val">15</span>
</div>

<div class="viewport-container">
<video id="video" controls></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="workflow-btn">Start</button>
<button onclick="toggleAnimation()">Toggle Animation</button>
</div>

<div id="report-modal">
<div class="report-content">
<h3>Report</h3>
<div id="rep"></div>
<canvas id="report-curve" style="width:100%; height:150px;"></canvas>
<button onclick="closeReport()">Close</button>
</div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let physics = new KickPhysicsEngine();

let startPt=null, midUpPt=null, peakPt=null, midDownPt=null, endPt=null;
let scaleDots=[];
let activeTap=null;

let cameraDistance = 15;

let animate = false;
let animT = 0;

document.getElementById('cam-depth').oninput = e=>{
 cameraDistance = e.target.value;
 document.getElementById('depth-val').innerText = cameraDistance;
};

document.getElementById('file-upload').onchange = e=>{
 const file = e.target.files[0];
 video.src = URL.createObjectURL(file);
 video.onloadeddata = ()=> resizeCanvas();
};

function resizeCanvas(){
 canvas.width = video.clientWidth;
 canvas.height = video.clientHeight;
 draw();
}

canvas.addEventListener('click', e=>{
 const rect = canvas.getBoundingClientRect();
 activeTap = {
   x:(e.clientX-rect.left)/rect.width,
   y:(e.clientY-rect.top)/rect.height
 };
 draw();
});

document.getElementById('workflow-btn').onclick = ()=>{
 if(scaleDots.length<2){
   scaleDots.push(activeTap);
 }
 else if(!startPt){
   startPt = {time:video.currentTime,pos:activeTap};
 }
 else if(!midUpPt){
   midUpPt = {time:video.currentTime,pos:activeTap};
 }
 else if(!peakPt){
   peakPt = {time:video.currentTime,pos:activeTap};
 }
 else if(!midDownPt){
   midDownPt = {time:video.currentTime,pos:activeTap};
 }
 else if(!endPt){
   endPt = {time:video.currentTime,pos:activeTap};
   calculate();
 }
 activeTap=null;
 draw();
};

function calculate(){
 const r = physics.calculate(
   startPt,midUpPt,peakPt,midDownPt,endPt,
   scaleDots,cameraDistance,canvas.width
 );

 document.getElementById('rep').innerText =
 `Good From: ${r.maxGoodDistance.toFixed(1)} yd
Drift: ${r.drift}
Time: ${r.time.toFixed(2)}s
Height: ${r.height.toFixed(1)} ft
Angle: ${r.angle.toFixed(1)}°`;

 drawReportCurve();
 document.getElementById('report-modal').style.display='flex';
}

function closeReport(){
 document.getElementById('report-modal').style.display='none';
}

function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 const drawDot = (pt,color)=>{
   if(!pt) return;
   ctx.fillStyle=color;
   ctx.beginPath();
   ctx.arc(pt.pos.x*canvas.width,pt.pos.y*canvas.height,5,0,Math.PI*2);
   ctx.fill();
 };

 drawDot(startPt,'green');
 drawDot(midUpPt,'yellow');
 drawDot(peakPt,'orange');
 drawDot(midDownPt,'purple');
 drawDot(endPt,'red');

 // --- CURVE ---
 if(startPt && midUpPt && peakPt && midDownPt && endPt){

   ctx.strokeStyle='cyan';
   ctx.lineWidth=2;

   ctx.beginPath();
   ctx.moveTo(startPt.pos.x*canvas.width,startPt.pos.y*canvas.height);

   if(animate){
     animT += 0.02;
     if(animT>1) animT=1;

     const t=animT;

     const x =
       Math.pow(1-t,4)*startPt.pos.x +
       4*Math.pow(1-t,3)*t*midUpPt.pos.x +
       6*Math.pow(1-t,2)*t*t*peakPt.pos.x +
       4*(1-t)*t*t*t*midDownPt.pos.x +
       t*t*t*t*endPt.pos.x;

     const y =
       Math.pow(1-t,4)*startPt.pos.y +
       4*Math.pow(1-t,3)*t*midUpPt.pos.y +
       6*Math.pow(1-t,2)*t*t*peakPt.pos.y +
       4*(1-t)*t*t*t*midDownPt.pos.y +
       t*t*t*t*endPt.pos.y;

     ctx.lineTo(x*canvas.width,y*canvas.height);

     if(animT<1) requestAnimationFrame(draw);

   } else {
     ctx.bezierCurveTo(
       midUpPt.pos.x*canvas.width, midUpPt.pos.y*canvas.height,
       midDownPt.pos.x*canvas.width, midDownPt.pos.y*canvas.height,
       endPt.pos.x*canvas.width, endPt.pos.y*canvas.height
     );
   }

   ctx.stroke();
 }
}

function drawReportCurve(){

 const c = document.getElementById('report-curve');
 const cx = c.getContext('2d');

 c.width = c.clientWidth;
 c.height = c.clientHeight;

 cx.clearRect(0,0,c.width,c.height);

 if(!startPt) return;

 cx.strokeStyle='cyan';
 cx.beginPath();

 cx.moveTo(startPt.pos.x*c.width,startPt.pos.y*c.height);

 cx.bezierCurveTo(
   midUpPt.pos.x*c.width, midUpPt.pos.y*c.height,
   midDownPt.pos.x*c.width, midDownPt.pos.y*c.height,
   endPt.pos.x*c.width, endPt.pos.y*c.height
 );

 cx.stroke();
}

function toggleAnimation(){
 animate = !animate;
 animT = 0;
 draw();
}
</script>

</body>
</html>
